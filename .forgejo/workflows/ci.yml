name: CI

# Lint, typecheck and test on every PR and on pushes to main. Runs on a Forgejo
# Actions runner (forgejo-runner with the Docker backend). Jobs run inside a
# container, so the Postgres service is reached by its service name `testdb`
# (deliberately not `postgres`, which collided with another DB on the runner net).
on:
  push:
    branches: [main]
  pull_request:

# Serialize ALL CI runs repo-wide. The Forgejo runner shares one Docker network
# (`forgejo-config_internal`) across jobs, so two concurrent runs would each spin
# up a Postgres service under the same `testdb` alias and step on each other
# (manifested as "port already allocated", then "relation \"users\" does not
# exist" when a run's schema push/seed hit the wrong database). A constant group
# with cancel-in-progress: false queues runs so they never overlap.
concurrency:
  group: ci-${{ github.repository }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      # Named `testdb` (not `postgres`) to avoid colliding with any pre-existing
      # `postgres` host on the runner network. Trust auth + no password in the URL
      # means a connection by the armurier role is accepted no matter what — the
      # CI database is ephemeral and isolated.
      #
      # No host `ports:` mapping on purpose: the job container reaches Postgres on
      # the runner network by service name (`testdb:5432`, see DATABASE_URL), so
      # publishing 5432 to the host is unnecessary — and it made concurrent PR
      # runs collide ("Bind for :::5432 failed: port is already allocated").
      testdb:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: armurier
          POSTGRES_DB: armurier_test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U armurier -d armurier_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    env:
      # The suite runs against the CI Postgres directly: the schema is created by
      # `drizzle-kit push` (below) and TEST_DB_SKIP_PROVISION makes the vitest
      # global setup seed it without trying to clone a local dev DB via docker.
      DATABASE_URL: postgresql://armurier@testdb:5432/armurier_test
      TEST_DATABASE_URL: postgresql://armurier@testdb:5432/armurier_test
      TEST_DB_SKIP_PROVISION: "true"
      STORAGE_DRIVER: memory
      # All other vars are required by env.ts; safe dummies — tests make no
      # external calls (Stripe is mocked, storage is in-memory, no mail is sent).
      JWT_SECRET: ci_jwt_secret_at_least_32_characters_long
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_at_least_32_characters
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: ci
      S3_SECRET_KEY: ci
      S3_BUCKET: ci
      S3_REGION: eu-west-1
      SMTP_HOST: localhost
      SMTP_USER: ci
      SMTP_PASS: ci
      SMTP_FROM: ci@example.com
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_test_dummy
      VIREMENT_IBAN: FR7630006000011234567890189
      VIREMENT_BIC: AGRIFRPP
      VIREMENT_BANK_NAME: Banque CI
      VIREMENT_ACCOUNT_HOLDER: SCS Firearm SAS

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm exec biome ci .

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Apply database schema
        run: pnpm --filter @armurier/api exec drizzle-kit push --force

      - name: Test
        run: pnpm -r test
