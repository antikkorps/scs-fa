services:
  postgres:
    image: postgres:17-alpine
    container_name: armurier_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: armurier
      POSTGRES_PASSWORD: armurier_dev_password
      POSTGRES_DB: armurier_dev
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U armurier -d armurier_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
